name: Velocity Spanish - Daily 7x Upload

on:
  # Schedule 7 posts per day (American EST/EDT time)
  schedule:
    - cron: '0 13 * * *'  # 8:00 AM EST
    - cron: '0 15 * * *'  # 10:00 AM EST
    - cron: '0 17 * * *'  # 12:00 PM EST
    - cron: '0 19 * * *'  # 2:00 PM EST
    - cron: '0 21 * * *'  # 4:00 PM EST
    - cron: '0 23 * * *'  # 6:00 PM EST
    - cron: '0 1 * * *'   # 8:00 PM EST

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download phrase history (if exists)
        uses: actions/download-artifact@v4
        id: download-history
        continue-on-error: true
        with:
          name: phrase-history
          path: output/history/

      - name: 📝 Debug - Show downloaded files
        run: |
          echo "🔍 Checking downloaded files..."
          echo "Contents of output/history/:"
          ls -la output/history/ 2>/dev/null || echo "Directory doesn't exist yet"
          echo ""
          echo "Contents of output/:"
          ls -la output/ 2>/dev/null || echo "Output directory doesn't exist yet"

      - name: 📝 Initialize history if not found
        run: |
          mkdir -p output/history

          # Check if downloaded history exists
          if [ -f "output/history/all_generated_phrases.json" ]; then
            echo "✅ Loaded existing phrase history"
            phrase_count=$(python -c "import json; data=json.load(open('output/history/all_generated_phrases.json')); print(len(data.get('used_english', data.get('phrases', []))))")
            echo "📊 History contains $phrase_count unique phrases - NO REPEATS WILL OCCUR"
          else
            # Create new history with proper structure (first run)
            echo '{"phrases": [], "used_english": [], "last_updated": null}' > output/history/all_generated_phrases.json
            echo "📝 Created NEW phrase history file (first run - no previous history)"
            echo "💡 Note: 'Artifact not found' warning above is NORMAL for first run"
          fi

          if [ ! -f "output/history/recent_categories.json" ]; then
            echo '{"date": null, "last_3_days": []}' > output/history/recent_categories.json
            echo "📝 Created recent categories file"
          else
            echo "✅ Loaded recent categories file"
          fi

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          echo "✅ System dependencies installed"

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "upload/requirements.txt" ]; then
            pip install -r upload/requirements.txt
          fi
          echo "✅ All dependencies installed"

      - name: 🔐 Create .env file from secrets
        run: |
          echo "POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}" >> .env
          echo "AI_MODEL=gemini-fast" >> .env
          echo "" >> .env
          echo "# YouTube" >> .env
          echo "YT_CLIENT_ID=${{ secrets.YT_CLIENT_ID }}" >> .env
          echo "YT_CLIENT_SECRET=${{ secrets.YT_CLIENT_SECRET }}" >> .env
          echo "YT_REFRESH_TOKEN=${{ secrets.YT_REFRESH_TOKEN }}" >> .env
          echo "" >> .env
          echo "# Instagram" >> .env
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}" >> .env
          echo "" >> .env
          echo "# Facebook" >> .env
          echo "FACEBOOK_ACCESS_TOKEN=${{ secrets.FACEBOOK_ACCESS_TOKEN }}" >> .env
          echo "FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}" >> .env
          echo "" >> .env
          echo "# Twitter/X" >> .env
          echo "TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}" >> .env
          echo "TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}" >> .env
          echo "TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}" >> .env
          echo "TWITTER_ACCESS_SECRET=${{ secrets.TWITTER_ACCESS_SECRET }}" >> .env
          echo "" >> .env
          echo "# VK" >> .env
          echo "VK_ACCESS_TOKEN=${{ secrets.VK_ACCESS_TOKEN }}" >> .env
          echo "VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}" >> .env
          echo "" >> .env
          echo "# Telegram" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}" >> .env
          echo "" >> .env
          echo "# Threads" >> .env
          echo "THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}" >> .env
          echo "THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}" >> .env
          echo "" >> .env
          echo "# TikTok" >> .env
          echo "TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}" >> .env
          echo "" >> .env
          echo "# Timezone" >> .env
          echo "TIMEZONE_OFFSET_HOURS=-5" >> .env
          echo "✅ .env file created"

      - name: 🎬 Generate Spanish Learning Reel
        run: |
          echo "🚀 Starting Velocity Spanish content generation..."
          echo ""
          echo "📋 PRE-GENERATION HISTORY CHECK:"
          echo "================================"
          if [ -f "output/history/all_generated_phrases.json" ]; then
            echo "✅ History file found"
            python3 -c "import json; d=json.load(open('output/history/all_generated_phrases.json')); print('Total phrases tracked:', len(d.get('used_english', []))); print('Last updated:', d.get('last_updated', 'Unknown'))"
          else
            echo "⚠️ No history file found - will create new one"
          fi
          echo "================================"
          echo ""
          python facebook_reels_automation.py
          echo ""
          echo "📋 POST-GENERATION HISTORY CHECK:"
          echo "=================================="
          python3 -c "import json; d=json.load(open('output/history/all_generated_phrases.json')); print('Total phrases tracked:', len(d.get('used_english', []))); print('Last updated:', d.get('last_updated', 'Unknown'))"
          echo "=================================="
          echo "✅ If phrase count increased, history is working correctly!"

      - name: 📤 Upload to All Social Media Platforms
        run: |
          echo "🚀 Starting multi-platform upload..."
          export PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/upload:$PYTHONPATH"
          python upload_all_platforms.py
          echo "✅ Upload complete!"

      - name: 📊 Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: velocity-spanish-reel-${{ github.run_number }}
          path: |
            output/video/*/final_reel.mp4
            output/video/*/metadata.json
          retention-days: 7

      - name: 📝 Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ github.run_number }}
          path: |
            output/history/*.json
            output/daily_summary_*.json
            output/upload_results_*.json
          retention-days: 7

      - name: 💾 Upload phrase history (for persistence)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: phrase-history
          path: |
            output/history/all_generated_phrases.json
            output/history/recent_categories.json
          retention-days: 90
          overwrite: true

      - name: 💾 Commit phrase history to repository
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f output/history/all_generated_phrases.json output/history/recent_categories.json || echo "⚠️  Git add failed (file may be in .gitignore)"
          if ! git diff --staged --quiet; then
            git commit -m "📊 Update phrase history - Run #${{ github.run_number }}" || echo "⚠️  Git commit failed"
            git push || echo "⚠️  Git push failed"
            echo "✅ Phrase history committed - NO repeats across runs!"
          else
            echo "ℹ️  No changes to commit"
          fi
